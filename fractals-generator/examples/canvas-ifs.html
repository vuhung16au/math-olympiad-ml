<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractals - Interactive Canvas Lab</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap");

      :root {
        color-scheme: light;
        --paper: #f7f6f2;
        --ink: #1f2328;
        --muted: #6a737d;
        --line: #d4d6da;
        --panel: #fffdf8;
        --accent: #005f73;
        --accent-soft: #e2f1f4;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Avenir Next", sans-serif;
        background:
          radial-gradient(circle at 20% 10%, #fff 0 2px, transparent 3px),
          radial-gradient(circle at 80% 25%, #fff 0 2px, transparent 3px),
          linear-gradient(140deg, #f0efe9 0%, #e6ebee 100%);
        background-size: 60px 60px, 80px 80px, auto;
        color: var(--ink);
        min-height: 100vh;
      }

      .layout {
        width: min(1280px, 96vw);
        margin: 22px auto;
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.07);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: clamp(1.2rem, 2.2vw, 1.7rem);
      }

      .sub {
        margin: 0 0 16px;
        font-size: 0.94rem;
        color: var(--muted);
      }

      .group {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fff;
      }

      .group-title {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #4b5563;
        margin: 0 0 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label {
        font-size: 0.86rem;
        color: #334155;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        border: 1px solid #b9c2cb;
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }

      textarea {
        min-height: 95px;
        resize: vertical;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.82rem;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        background: var(--accent-soft);
        color: #123744;
      }

      .viewer {
        background: #fcfdff;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.07);
      }

      .viewer-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 10px;
      }

      .viewer-title {
        margin: 0;
        font-size: clamp(1rem, 2vw, 1.5rem);
      }

      .meta {
        margin: 0;
        color: #425466;
        font-size: 0.9rem;
      }

      .canvas-wrap {
        border: 1px solid #d4dae0;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        background: #fff;
      }

      .inline {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <aside class="panel">
        <h1>Fractal Controls</h1>
        <p class="sub">Select a fractal family, tweak parameters, then generate.</p>

        <section class="group">
          <p class="group-title">Type</p>
          <div class="field">
            <label for="fractalType">Fractal Type</label>
            <select id="fractalType">
              <option value="ifs">IFS</option>
              <option value="lsystem">L-system</option>
              <option value="escapeTime">Escape-time</option>
              <option value="newton">Newton</option>
              <option value="attractor">Strange Attractor</option>
              <option value="inversion">Circle Inversion</option>
            </select>
          </div>
          <div class="field">
            <label for="preset">Preset</label>
            <select id="preset"></select>
          </div>
        </section>

        <section class="group" id="ifsFields">
          <p class="group-title">IFS Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="ifsIterations">Iterations</label>
              <input id="ifsIterations" type="number" min="1000" max="600000" step="1000" />
            </div>
            <div class="field">
              <label for="ifsDensity">Density</label>
              <input id="ifsDensity" type="number" min="1" max="150" step="1" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="ifsPointSize">Point Size</label>
              <input id="ifsPointSize" type="number" min="0.5" max="4" step="0.1" />
            </div>
            <div class="field">
              <label for="ifsColor">Color Mode</label>
              <select id="ifsColor">
                <option value="matrix">By Matrix</option>
                <option value="emerald">Emerald</option>
                <option value="ink">Black Ink</option>
              </select>
            </div>
          </div>
        </section>

        <section class="group" id="lsysFields" hidden>
          <p class="group-title">L-system Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="lsIterations">Iterations</label>
              <input id="lsIterations" type="number" min="0" max="13" step="1" />
            </div>
            <div class="field">
              <label for="lsDistance">Distance</label>
              <input id="lsDistance" type="number" min="0.1" max="40" step="0.1" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="lsAngle">Angle</label>
              <input id="lsAngle" type="number" min="0" max="360" step="0.1" />
            </div>
            <div class="field">
              <label for="lsScale">Length Scale</label>
              <input id="lsScale" type="number" min="0.1" max="2" step="0.01" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="lsLineWidth">Line Width</label>
              <input id="lsLineWidth" type="number" min="0.2" max="5" step="0.1" />
            </div>
            <div class="field">
              <label for="lsColor">Line Color</label>
              <input id="lsColor" type="color" value="#14532d" />
            </div>
          </div>
          <div class="field">
            <label for="lsAxiom">Axiom</label>
            <input id="lsAxiom" type="text" />
          </div>
          <div class="field">
            <label for="lsRules">Rules (one per line, format: X=F+X)</label>
            <textarea id="lsRules"></textarea>
          </div>
        </section>

        <section class="group" id="escapeFields" hidden>
          <p class="group-title">Escape-time Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="etMaxIterations">Max Iterations</label>
              <input id="etMaxIterations" type="number" min="20" max="4000" step="10" />
            </div>
            <div class="field">
              <label for="etBailout">Bailout Radius</label>
              <input id="etBailout" type="number" min="2" max="100" step="1" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="etPower">Power</label>
              <input id="etPower" type="number" min="2" max="8" step="1" />
            </div>
            <div class="field">
              <label for="etJuliaRe">Julia c (real)</label>
              <input id="etJuliaRe" type="number" min="-2" max="2" step="0.001" />
            </div>
          </div>
          <div class="field">
            <label for="etJuliaIm">Julia c (imag)</label>
            <input id="etJuliaIm" type="number" min="-2" max="2" step="0.001" />
          </div>
        </section>

        <section class="group" id="newtonFields" hidden>
          <p class="group-title">Newton Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="ntMaxIterations">Max Iterations</label>
              <input id="ntMaxIterations" type="number" min="5" max="200" step="1" />
            </div>
            <div class="field">
              <label for="ntEpsilon">Epsilon</label>
              <input id="ntEpsilon" type="number" min="0.00000001" max="0.1" step="0.000001" />
            </div>
          </div>
        </section>

        <section class="group" id="attractorFields" hidden>
          <p class="group-title">Attractor Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="atIterations">Iterations</label>
              <input id="atIterations" type="number" min="10000" max="2000000" step="10000" />
            </div>
            <div class="field">
              <label for="atDiscard">Discard</label>
              <input id="atDiscard" type="number" min="0" max="50000" step="100" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="atA">a</label>
              <input id="atA" type="number" min="-5" max="5" step="0.001" />
            </div>
            <div class="field">
              <label for="atB">b</label>
              <input id="atB" type="number" min="-5" max="5" step="0.001" />
            </div>
          </div>
          <div class="inline">
            <div class="field">
              <label for="atC">c</label>
              <input id="atC" type="number" min="-5" max="5" step="0.001" />
            </div>
            <div class="field">
              <label for="atD">d</label>
              <input id="atD" type="number" min="-5" max="5" step="0.001" />
            </div>
          </div>
        </section>

        <section class="group" id="inversionFields" hidden>
          <p class="group-title">Inversion Parameters</p>
          <div class="inline">
            <div class="field">
              <label for="ivDepth">Depth</label>
              <input id="ivDepth" type="number" min="1" max="12" step="1" />
            </div>
            <div class="field">
              <label for="ivMinRadius">Min Radius</label>
              <input id="ivMinRadius" type="number" min="0.0001" max="0.2" step="0.0001" />
            </div>
          </div>
        </section>

        <section class="actions">
          <button id="generateBtn" class="btn btn-primary" type="button">Generate</button>
          <button id="resetBtn" class="btn btn-secondary" type="button">Reset Preset</button>
        </section>
      </aside>

      <section class="viewer">
        <div class="viewer-header">
          <h2 class="viewer-title" id="viewerTitle">Fractal Render</h2>
          <p class="meta" id="meta">Ready</p>
        </div>
        <div class="canvas-wrap">
          <canvas id="canvas" width="980" height="760"></canvas>
        </div>
      </section>
    </main>

      const ctx = ui.canvas.getContext("2d");

      function getPresetCollection(type) {
        if (type === "ifs" || type === "lsystem") {
          return PRESETS[type];
        }
        return EXTRA_PRESETS[type];
      }

      function toRuleText(rules) {
        return Object.entries(rules)
          .map(([key, value]) => `${key}=${value}`)
          .join("\n");
      }

      function parseRules(text) {
        const entries = text
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const idx = line.indexOf("=");
            if (idx <= 0) {
              throw new Error(`Invalid rule line: \"${line}\"`);
            }
            return [line.slice(0, idx).trim(), line.slice(idx + 1).trim()];
          });

        return Object.fromEntries(entries);
      }

      function seededRandom(seed) {
        let state = seed >>> 0;
        return () => {
          state = (1664525 * state + 1013904223) >>> 0;
          return state / 0x100000000;
        };
      }

      function buildRandomIfsMatrices(config = {}) {
        const count = Math.max(3, Math.min(6, Math.round(config.count ?? 4)));
        const random = seededRandom(config.seed ?? 1337);
        const matrices = [];
        const p = 1 / count;
        for (let i = 0; i < count; i += 1) {
          matrices.push({
            a: random() * 0.62 - 0.31,
            b: random() * 0.62 - 0.31,
            c: random() * 0.62 - 0.31,
            d: random() * 0.62 - 0.31,
            e: random() * 2 - 1,
            f: random() * 2 - 1,
            p
          });
        }
        return matrices;
      }

      function clearCanvas() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, ui.canvas.width, ui.canvas.height);
      }

      function setPixel(imageData, x, y, r, g, b, a = 255) {
        if (x < 0 || y < 0 || x >= imageData.width || y >= imageData.height) {
          return;
        }
        const idx = (y * imageData.width + x) * 4;
        imageData.data[idx] = r;
        imageData.data[idx + 1] = g;
        imageData.data[idx + 2] = b;
        imageData.data[idx + 3] = a;
      }

      function gradientColor(t) {
        const stops = [
          [9, 10, 38],
          [45, 78, 140],
          [98, 187, 255],
          [255, 236, 130],
          [255, 140, 66]
        ];

        const clamped = Math.max(0, Math.min(1, t));
        const scaled = clamped * (stops.length - 1);
        const i = Math.floor(scaled);
        const f = scaled - i;
        const c1 = stops[i];
        const c2 = stops[Math.min(stops.length - 1, i + 1)];
        return [
          Math.round(c1[0] + (c2[0] - c1[0]) * f),
          Math.round(c1[1] + (c2[1] - c1[1]) * f),
          Math.round(c1[2] + (c2[2] - c1[2]) * f)
        ];
      }

      function mapPixelToComplex(x, y, viewport) {
        const re = viewport.minX + (x / (ui.canvas.width - 1)) * (viewport.maxX - viewport.minX);
        const im = viewport.maxY - (y / (ui.canvas.height - 1)) * (viewport.maxY - viewport.minY);
        return [re, im];
      }

      function drawEscapeTime(preset, params) {
        const imageData = ctx.createImageData(ui.canvas.width, ui.canvas.height);
        const maxIterations = params.maxIterations;
        const bailout = params.bailout;
        const power = params.power;

        for (let y = 0; y < ui.canvas.height; y += 1) {
          for (let x = 0; x < ui.canvas.width; x += 1) {
            const [u, v] = mapPixelToComplex(x, y, preset.viewport);
            let zr;
            let zi;
            let cr;
            let ci;

            if (preset.type === "julia") {
              zr = u;
              zi = v;
              cr = params.cRe;
              ci = params.cIm;
            } else {
              zr = 0;
              zi = 0;
              cr = u;
              ci = v;
            }

            let escaped = false;
            let iter = 0;
            for (; iter < maxIterations; iter += 1) {
              let ar = zr;
              let ai = zi;
              if (preset.type === "burning-ship") {
                ar = Math.abs(ar);
                ai = Math.abs(ai);
              }

              let nextR;
              let nextI;
              if (power === 2) {
                nextR = ar * ar - ai * ai + cr;
                nextI = 2 * ar * ai + ci;
              } else {
                const mag = Math.sqrt(ar * ar + ai * ai);
                const angle = Math.atan2(ai, ar);
                const magPow = mag ** power;
                nextR = magPow * Math.cos(power * angle) + cr;
                nextI = magPow * Math.sin(power * angle) + ci;
              }

              zr = nextR;
              zi = nextI;

              if (zr * zr + zi * zi > bailout * bailout) {
                escaped = true;
                break;
              }
            }

            if (!escaped) {
              setPixel(imageData, x, y, 6, 7, 15, 255);
              continue;
            }

            const [r, g, b] = gradientColor(iter / maxIterations);
            setPixel(imageData, x, y, r, g, b, 255);
          }
        }

        ctx.putImageData(imageData, 0, 0);
        ui.meta.textContent = `Rendered ${ui.canvas.width * ui.canvas.height} pixels`;
      }

      function closestRootIndex(zr, zi, roots) {
        let idx = 0;
        let best = Number.POSITIVE_INFINITY;
        for (let i = 0; i < roots.length; i += 1) {
          const dr = zr - roots[i][0];
          const di = zi - roots[i][1];
          const d2 = dr * dr + di * di;
          if (d2 < best) {
            best = d2;
            idx = i;
          }
        }
        return idx;
      }

      function drawNewton(preset, params) {
        const imageData = ctx.createImageData(ui.canvas.width, ui.canvas.height);
        const roots = preset.type === "newton-cubic"
          ? [[1, 0], [-0.5, Math.sqrt(3) / 2], [-0.5, -Math.sqrt(3) / 2]]
          : [[1, 0], [0, 1], [-1, 0], [0, -1]];

        const palette = [[239, 68, 68], [59, 130, 246], [34, 197, 94], [234, 179, 8]];

        for (let y = 0; y < ui.canvas.height; y += 1) {
          for (let x = 0; x < ui.canvas.width; x += 1) {
            let [zr, zi] = mapPixelToComplex(x, y, preset.viewport);
            let iter = 0;

            for (; iter < params.maxIterations; iter += 1) {
              let fr;
              let fi;
              let dfr;
              let dfi;

              if (preset.type === "newton-cubic") {
                const z2r = zr * zr - zi * zi;
                const z2i = 2 * zr * zi;
                const z3r = z2r * zr - z2i * zi;
                const z3i = z2r * zi + z2i * zr;
                fr = z3r - 1;
                fi = z3i;
                dfr = 3 * z2r;
                dfi = 3 * z2i;
              } else {
                const z2r = zr * zr - zi * zi;
                const z2i = 2 * zr * zi;
                const z3r = z2r * zr - z2i * zi;
                const z3i = z2r * zi + z2i * zr;
                const z4r = z2r * z2r - z2i * z2i;
                const z4i = 2 * z2r * z2i;
                fr = z4r - 1;
                fi = z4i;
                dfr = 4 * z3r;
                dfi = 4 * z3i;
              }

              const denom = dfr * dfr + dfi * dfi;
              if (denom < 1e-14) {
                break;
              }
              const qr = (fr * dfr + fi * dfi) / denom;
              const qi = (fi * dfr - fr * dfi) / denom;
              zr -= qr;
              zi -= qi;
              if (qr * qr + qi * qi < params.epsilon * params.epsilon) {
                break;
              }
            }

            const rootIndex = closestRootIndex(zr, zi, roots);
            const base = palette[rootIndex % palette.length];
            const shade = 0.35 + 0.65 * (1 - iter / params.maxIterations);
            setPixel(
              imageData,
              x,
              y,
              Math.round(base[0] * shade),
              Math.round(base[1] * shade),
              Math.round(base[2] * shade),
              255
            );
          }
        }

        ctx.putImageData(imageData, 0, 0);
        ui.meta.textContent = `Rendered ${ui.canvas.width * ui.canvas.height} pixels`;
      }

      function iterateAttractor(type, state, p) {
        const x = state.x;
        const y = state.y;
        const z = state.z ?? 0;
        if (type === "clifford") {
          return {
            x: Math.sin(p.a * y) + p.c * Math.cos(p.a * x),
            y: Math.sin(p.b * x) + p.d * Math.cos(p.b * y),
            z
          };
        }
        if (type === "peter-de-jong") {
          return {
            x: Math.sin(p.a * y) - Math.cos(p.b * x),
            y: Math.sin(p.c * x) - Math.cos(p.d * y),
            z
          };
        }
        if (type === "henon") {
          return {
            x: 1 - p.a * x * x + y,
            y: p.b * x,
            z
          };
        }
        if (type === "ikeda") {
          const t = 0.4 - 6 / (1 + x * x + y * y);
          return {
            x: 1 + p.a * (x * Math.cos(t) - y * Math.sin(t)),
            y: p.a * (x * Math.sin(t) + y * Math.cos(t)),
            z
          };
        }
        if (type === "hopalong") {
          const sign = x < 0 ? -1 : 1;
          return {
            x: y - sign * Math.sqrt(Math.abs(p.b * x - p.c)),
            y: p.a - x,
            z
          };
        }
        if (type === "lorenz") {
          const dt = p.d ?? 0.005;
          const nextX = x + p.a * (y - x) * dt;
          const nextY = y + (x * (p.b - z) - y) * dt;
          const nextZ = z + (x * y - p.c * z) * dt;
          return {
            x: nextX,
            y: nextY,
            z: nextZ
          };
        }
        return {
          x,
          y,
          z
        };
      }

      function projectAttractor(type, state) {
        if (type === "lorenz") {
          return { px: state.x, py: state.z };
        }
        return { px: state.x, py: state.y };
      }

      function drawAttractor(preset, params) {
        const width = ui.canvas.width;
        const height = ui.canvas.height;
        let state = {
          x: preset.type === "lorenz" ? 0.1 : 0,
          y: 0,
          z: 0
        };
        let minX = Number.POSITIVE_INFINITY;
        let minY = Number.POSITIVE_INFINITY;
        let maxX = Number.NEGATIVE_INFINITY;
        let maxY = Number.NEGATIVE_INFINITY;

        for (let i = 0; i < params.iterations; i += 1) {
          state = iterateAttractor(preset.type, state, params);
          if (i < params.discard) {
            continue;
          }
          const { px: x, py: y } = projectAttractor(preset.type, state);
          minX = Math.min(minX, x);
          minY = Math.min(minY, y);
          maxX = Math.max(maxX, x);
          maxY = Math.max(maxY, y);
        }

        const hist = new Uint32Array(width * height);
        state = {
          x: preset.type === "lorenz" ? 0.1 : 0,
          y: 0,
          z: 0
        };
        const sx = (width - 1) / Math.max(1e-9, maxX - minX);
        const sy = (height - 1) / Math.max(1e-9, maxY - minY);
        let maxCount = 0;

        for (let i = 0; i < params.iterations; i += 1) {
          state = iterateAttractor(preset.type, state, params);
          if (i < params.discard) {
            continue;
          }
          const { px: x, py: y } = projectAttractor(preset.type, state);

          const px = Math.floor((x - minX) * sx);
          const py = Math.floor((maxY - y) * sy);
          if (px < 0 || py < 0 || px >= width || py >= height) {
            continue;
          }

          const idx = py * width + px;
          hist[idx] += 1;
          if (hist[idx] > maxCount) {
            maxCount = hist[idx];
          }
        }

        const imageData = ctx.createImageData(width, height);
        for (let py = 0; py < height; py += 1) {
          for (let px = 0; px < width; px += 1) {
            const count = hist[py * width + px];
            if (!count) {
              continue;
            }
            const [r, g, b] = gradientColor(Math.log(count + 1) / Math.log(maxCount + 1));
            setPixel(imageData, px, py, r, g, b, 255);
          }
        }

        ctx.putImageData(imageData, 0, 0);
        ui.meta.textContent = `Rendered ${(params.iterations - params.discard).toLocaleString()} orbit points`;
      }

      function drawPixelLine(x0, y0, x1, y1, color) {
        let x = x0;
        let y = y0;
        const dx = Math.abs(x1 - x0);
        const sx = x0 < x1 ? 1 : -1;
        const dy = -Math.abs(y1 - y0);
        const sy = y0 < y1 ? 1 : -1;
        let err = dx + dy;

        while (true) {
          ctx.fillStyle = color;
          ctx.fillRect(x, y, 1, 1);
          if (x === x1 && y === y1) {
            break;
          }
          const e2 = 2 * err;
          if (e2 >= dy) {
            err += dy;
            x += sx;
          }
          if (e2 <= dx) {
            err += dx;
            y += sy;
          }
        }
      }

      function drawCircleOutline(cx, cy, r, color) {
        const samples = Math.max(24, Math.round(2 * Math.PI * r));
        for (let i = 0; i < samples; i += 1) {
          const t1 = (i / samples) * Math.PI * 2;
          const t2 = ((i + 1) / samples) * Math.PI * 2;
          const x1 = Math.round(cx + r * Math.cos(t1));
          const y1 = Math.round(cy + r * Math.sin(t1));
          const x2 = Math.round(cx + r * Math.cos(t2));
          const y2 = Math.round(cy + r * Math.sin(t2));
          drawPixelLine(x1, y1, x2, y2, color);
        }
      }

      function drawInversion(preset, params) {
        function drawApollonianInversion() {
          const circles = [];
          const seen = new Set();

          function key(c) {
            return `${Math.round(c.k * 1e6)}:${Math.round(c.x * 1e6)}:${Math.round(c.y * 1e6)}`;
          }

          function addCircle(c) {
            const k = key(c);
            if (seen.has(k)) {
              return false;
            }
            seen.add(k);
            circles.push(c);
            return true;
          }

          const c1 = { k: -1, x: 0, y: 0 };
          const c2 = { k: 2, x: -0.5, y: 0 };
          const c3 = { k: 2, x: 0.5, y: 0 };
          const c4 = { k: 3, x: 0, y: 2 / 3 };
          [c1, c2, c3, c4].forEach(addCircle);

          function recurse(a, b, c, d, depth) {
            if (depth <= 0) {
              return;
            }
            const combos = [[b, c, d, a], [a, c, d, b], [a, b, d, c], [a, b, c, d]];

            for (const [u, v, w, old] of combos) {
              const k = 2 * (u.k + v.k + w.k) - old.k;
              if (Math.abs(k) < 1e-9) {
                continue;
              }
              const x = (2 * (u.k * u.x + v.k * v.x + w.k * w.x) - old.k * old.x) / k;
              const y = (2 * (u.k * u.y + v.k * v.y + w.k * w.y) - old.k * old.y) / k;
              const r = Math.abs(1 / k);
              if (r < params.minRadius) {
                continue;
              }
              const circle = { k, x, y };
              if (!addCircle(circle)) {
                continue;
              }
              recurse(u, v, w, circle, depth - 1);
            }
          }

          recurse(c1, c2, c3, c4, params.depth);

          const margin = 18;
          const scale = Math.min((ui.canvas.width - margin * 2) / 2, (ui.canvas.height - margin * 2) / 2);
          const centerX = Math.round(ui.canvas.width / 2);
          const centerY = Math.round(ui.canvas.height / 2);

          for (const c of circles) {
            const r = Math.abs(1 / c.k) * scale;
            const px = Math.round(centerX + c.x * scale);
            const py = Math.round(centerY - c.y * scale);
            drawCircleOutline(px, py, r, "#111827");
          }

          ui.meta.textContent = `Rendered ${circles.length.toLocaleString()} circles`;
        }

        function invertPoint(point, circle) {
          const dx = point.x - circle.x;
          const dy = point.y - circle.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 1e-14) {
            return null;
          }
          const scale = (circle.r * circle.r) / d2;
          return {
            x: circle.x + dx * scale,
            y: circle.y + dy * scale
          };
        }

        function composeInversions(point, first, second) {
          const p1 = invertPoint(point, first);
          if (!p1) {
            return null;
          }
          return invertPoint(p1, second);
        }

        function drawKleinianInversion() {
          const defaults = preset.defaults;
          const circles = defaults.circles;
          const iterations = defaults.iterations;
          const discard = defaults.discard;
          const points = [];
          let minX = Number.POSITIVE_INFINITY;
          let minY = Number.POSITIVE_INFINITY;
          let maxX = Number.NEGATIVE_INFINITY;
          let maxY = Number.NEGATIVE_INFINITY;

          const generators = [
            (point) => composeInversions(point, circles[0], circles[1]),
            (point) => composeInversions(point, circles[1], circles[0]),
            (point) => composeInversions(point, circles[2], circles[3]),
            (point) => composeInversions(point, circles[3], circles[2])
          ];
          const inverseGenerator = [1, 0, 3, 2];

          let point = { ...defaults.seed };
          let previousGenerator = -1;
          let maxCount = 0;
          let plotted = 0;

          for (let i = 0; i < iterations + discard; i += 1) {
            let generatorIndex = Math.floor(Math.random() * generators.length);
            if (previousGenerator >= 0) {
              while (generatorIndex === inverseGenerator[previousGenerator]) {
                generatorIndex = Math.floor(Math.random() * generators.length);
              }
            }

            const next = generators[generatorIndex](point);
            previousGenerator = generatorIndex;

            if (!next || !Number.isFinite(next.x) || !Number.isFinite(next.y)) {
              point = { x: 0.02, y: 0.02 };
              previousGenerator = -1;
              continue;
            }

            point = next;

            if (i < discard) {
              continue;
            }
            points.push([point.x, point.y]);
            minX = Math.min(minX, point.x);
            minY = Math.min(minY, point.y);
            maxX = Math.max(maxX, point.x);
            maxY = Math.max(maxY, point.y);
          }

          if (points.length === 0) {
            ui.meta.textContent = "Rendered 0 points";
            return;
          }

          const hist = new Uint32Array(ui.canvas.width * ui.canvas.height);
          const pad = 0.03;
          const spanX = Math.max(1e-9, maxX - minX);
          const spanY = Math.max(1e-9, maxY - minY);
          const loX = minX - spanX * pad;
          const hiX = maxX + spanX * pad;
          const loY = minY - spanY * pad;
          const hiY = maxY + spanY * pad;

          for (let i = 0; i < points.length; i += 1) {
            const x = points[i][0];
            const y = points[i][1];
            const px = Math.floor(((x - loX) / (hiX - loX)) * (ui.canvas.width - 1));
            const py = Math.floor(((hiY - y) / (hiY - loY)) * (ui.canvas.height - 1));
            if (px < 0 || py < 0 || px >= ui.canvas.width || py >= ui.canvas.height) {
              continue;
            }
            const idx = py * ui.canvas.width + px;
            hist[idx] += 1;
            plotted += 1;
            if (hist[idx] > maxCount) {
              maxCount = hist[idx];
            }
          }

          const imageData = ctx.createImageData(ui.canvas.width, ui.canvas.height);
          for (let py = 0; py < ui.canvas.height; py += 1) {
            for (let px = 0; px < ui.canvas.width; px += 1) {
              const value = hist[py * ui.canvas.width + px];
              if (value === 0) {
                continue;
              }
              const [r, g, b] = gradientColor(Math.log(value + 1) / Math.log(maxCount + 1));
              setPixel(imageData, px, py, r, g, b, 255);
            }
          }

          ctx.putImageData(imageData, 0, 0);
          ui.meta.textContent = `Rendered ${plotted.toLocaleString()} points`;
        }

        if (preset.type === "apollonian-gasket") {
          drawApollonianInversion();
          return;
        }
        if (preset.type === "kleinian-schottky") {
          drawKleinianInversion();
          return;
        }
        throw new Error(`Unsupported inversion preset type: ${preset.type}`);
      }

      function getTransform(bounds, padding = 28) {
        const [maxX, maxY, minX, minY] = bounds;
        const width = Math.max(1, maxX - minX);
        const height = Math.max(1, maxY - minY);
        const sx = (ui.canvas.width - padding * 2) / width;
        const sy = (ui.canvas.height - padding * 2) / height;
        const scale = Math.min(sx, sy);
        const offsetX = (ui.canvas.width - width * scale) / 2;
        const offsetY = (ui.canvas.height - height * scale) / 2;

        return (x, y) => [
          (x - minX) * scale + offsetX,
          ui.canvas.height - ((y - minY) * scale + offsetY)
        ];
      }

      function populatePresetOptions() {
        const type = ui.fractalType.value;
        const presets = getPresetCollection(type);
        const keys = Object.keys(presets);

        ui.preset.innerHTML = "";
        keys.forEach((key) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = presets[key].label;
          ui.preset.append(option);
        });
      }

      function applyPresetToForm() {
        const type = ui.fractalType.value;
        const preset = getPresetCollection(type)[ui.preset.value];

        if (type === "ifs") {
          ui.ifsIterations.value = String(preset.defaults.iterations);
          ui.ifsDensity.value = String(preset.defaults.density);
          ui.ifsPointSize.value = String(preset.defaults.pointSize);
          ui.ifsColor.value = preset.defaults.colorMode;
        } else if (type === "lsystem") {
          ui.lsIterations.value = String(preset.defaults.iterations);
          ui.lsDistance.value = String(preset.defaults.distance);
          ui.lsAngle.value = String(preset.defaults.angle);
          ui.lsScale.value = String(preset.defaults.lengthScale);
          ui.lsLineWidth.value = String(preset.defaults.lineWidth);
          ui.lsColor.value = preset.defaults.lineColor;
          ui.lsAxiom.value = preset.axiom;
          ui.lsRules.value = toRuleText(preset.rules);
        } else if (type === "escapeTime") {
          ui.etMaxIterations.value = String(preset.defaults.maxIterations);
          ui.etBailout.value = String(preset.defaults.bailout);
          ui.etPower.value = String(preset.defaults.power);
          ui.etJuliaRe.value = String(preset.defaults.cRe);
          ui.etJuliaIm.value = String(preset.defaults.cIm);
        } else if (type === "newton") {
          ui.ntMaxIterations.value = String(preset.defaults.maxIterations);
          ui.ntEpsilon.value = String(preset.defaults.epsilon);
        } else if (type === "attractor") {
          ui.atIterations.value = String(preset.defaults.iterations);
          ui.atDiscard.value = String(preset.defaults.discard);
          ui.atA.value = String(preset.defaults.a);
          ui.atB.value = String(preset.defaults.b);
          ui.atC.value = String(preset.defaults.c);
          ui.atD.value = String(preset.defaults.d);
        } else if (type === "inversion") {
          ui.ivDepth.value = String(preset.defaults.depth ?? 8);
          ui.ivMinRadius.value = String(preset.defaults.minRadius ?? 0.003);
        }
      }

      function syncVisibleFields() {
        const type = ui.fractalType.value;
        ui.ifsFields.hidden = type !== "ifs";
        ui.lsysFields.hidden = type !== "lsystem";
        ui.escapeFields.hidden = type !== "escapeTime";
        ui.newtonFields.hidden = type !== "newton";
        ui.attractorFields.hidden = type !== "attractor";
        ui.inversionFields.hidden = type !== "inversion";
      }

      function drawIFS(fractal, params) {
        const mapPoint = getTransform(fractal.bounds);

        for (let i = 0; i < fractal.points.length; i += 1) {
          const [x, y, { matrixNum }] = fractal.points[i];
          const [px, py] = mapPoint(x, y);

          if (params.colorMode === "matrix") {
            const hue = 120 + matrixNum * 20;
            ctx.fillStyle = `hsl(${hue}, 76%, 42%)`;
          } else if (params.colorMode === "emerald") {
            ctx.fillStyle = "#059669";
          } else {
            ctx.fillStyle = "#111827";
          }

          ctx.fillRect(px, py, params.pointSize, params.pointSize);
        }

        ui.meta.textContent = `Rendered ${fractal.points.length.toLocaleString()} points`;
      }

      function drawLSystem(fractal, params) {
        const mapPoint = getTransform(fractal.bounds, 36);

        ctx.lineWidth = params.lineWidth;
        ctx.strokeStyle = params.lineColor;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();

        for (let i = 0; i < fractal.points.length; i += 1) {
          const [x, y, meta] = fractal.points[i];
          const [px, py] = mapPoint(x, y);
          if (meta.paintable) {
            ctx.lineTo(px, py);
          } else {
            ctx.moveTo(px, py);
          }
        }

        ctx.stroke();
        ui.meta.textContent = `Rendered ${fractal.points.length.toLocaleString()} points`;
      }

      function generate() {
        clearCanvas();
        ui.meta.style.color = "#425466";

        try {
          const type = ui.fractalType.value;
          const preset = getPresetCollection(type)[ui.preset.value];

          if (type === "ifs") {
            const params = {
              iterations: Number(ui.ifsIterations.value),
              density: Number(ui.ifsDensity.value),
              pointSize: Number(ui.ifsPointSize.value),
              colorMode: ui.ifsColor.value
            };

            const matrices = preset.randomGenerator ? buildRandomIfsMatrices(preset.randomGenerator) : preset.matrices;
            const fractal = new IFS({
              matrices,
              iterations: params.iterations,
              density: params.density,
              equation: preset.equation === "radial" ? radial : undefined
            });

            fractal.run();
            ui.viewerTitle.textContent = `IFS - ${preset.label}`;
            drawIFS(fractal, params);
          } else if (type === "lsystem") {
            const params = {
              iterations: Number(ui.lsIterations.value),
              distance: Number(ui.lsDistance.value),
              angle: Number(ui.lsAngle.value),
              lengthScale: Number(ui.lsScale.value),
              lineWidth: Number(ui.lsLineWidth.value),
              lineColor: ui.lsColor.value,
              axiom: ui.lsAxiom.value.trim(),
              rules: parseRules(ui.lsRules.value)
            };

            const fractal = new LSystem({
              axiom: params.axiom,
              rules: params.rules,
              iterations: params.iterations,
              distance: params.distance,
              angle: params.angle,
              lengthScale: params.lengthScale
            });

            fractal.run();
            ui.viewerTitle.textContent = `L-system - ${preset.label}`;
            drawLSystem(fractal, params);
          } else if (type === "escapeTime") {
            const params = {
              maxIterations: Number(ui.etMaxIterations.value),
              bailout: Number(ui.etBailout.value),
              power: Number(ui.etPower.value),
              cRe: Number(ui.etJuliaRe.value),
              cIm: Number(ui.etJuliaIm.value)
            };
            ui.viewerTitle.textContent = `Escape-time - ${preset.label}`;
            drawEscapeTime(preset, params);
          } else if (type === "newton") {
            const params = {
              maxIterations: Number(ui.ntMaxIterations.value),
              epsilon: Number(ui.ntEpsilon.value)
            };
            ui.viewerTitle.textContent = `Newton - ${preset.label}`;
            drawNewton(preset, params);
          } else if (type === "attractor") {
            const params = {
              iterations: Number(ui.atIterations.value),
              discard: Number(ui.atDiscard.value),
              a: Number(ui.atA.value),
              b: Number(ui.atB.value),
              c: Number(ui.atC.value),
              d: Number(ui.atD.value)
            };
            ui.viewerTitle.textContent = `Attractor - ${preset.label}`;
            drawAttractor(preset, params);
          } else if (type === "inversion") {
            const params = {
              depth: Number(ui.ivDepth.value),
              minRadius: Number(ui.ivMinRadius.value)
            };
            ui.viewerTitle.textContent = `Inversion - ${preset.label}`;
            drawInversion(preset, params);
          }
        } catch (error) {
          ui.meta.style.color = "#9f1239";
          ui.meta.textContent = `Render failed: ${error instanceof Error ? error.message : String(error)}`;
          console.error(error);
        }
      }

      ui.fractalType.addEventListener("change", () => {
        syncVisibleFields();
        populatePresetOptions();
        applyPresetToForm();
        generate();
      });

      ui.preset.addEventListener("change", () => {
        applyPresetToForm();
        generate();
      });

      ui.generateBtn.addEventListener("click", generate);
      ui.resetBtn.addEventListener("click", () => {
        applyPresetToForm();
        generate();
      });

      syncVisibleFields();
      populatePresetOptions();
      applyPresetToForm();
      generate();
    </script>
  </body>
</html>
